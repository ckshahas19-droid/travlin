<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRAVLIN Travel Agency</title>
    <script>
      // Force rewrite permission for fetch on Window prototype to prevent:
      // "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // when polyfills or external wrappers try to redefine `window.fetch`.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return currentFetch; },
              set: function(val) { currentFetch = val; },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Unable to patch window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
